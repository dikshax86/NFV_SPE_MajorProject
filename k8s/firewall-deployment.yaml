apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall-service
  labels:
    app: firewall-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: firewall-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: firewall-service
    spec:
      containers:
      - name: firewall-service
        image: diksha/firewall-service:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: firewall-service
spec:
  selector:
    app: firewall-service
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
