apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-service
  labels:
    app: monitor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitor-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: monitor-service
    spec:
      containers:
      - name: monitor-service
        image: dknights/monitor-service:latest
        ports:
        - containerPort: 5002
        env:
        - name: LOGSTASH_HOST
          value: "host.minikube.internal"
        - name: LOGSTASH_PORT
          value: "5050"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: monitor-service
spec:
  selector:
    app: monitor-service
  type: ClusterIP
  ports:
  - port: 5002
    targetPort: 5002
    protocol: TCP
