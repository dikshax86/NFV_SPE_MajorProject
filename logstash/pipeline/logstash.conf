input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  mutate {
    add_field => { "application" => "nfv-devops" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "nfv-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
